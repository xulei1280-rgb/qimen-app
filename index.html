<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
<title>奇门遁甲 - 时家转盘排盘</title>
<style>
:root{
  --bg:#eef1ea;
  --paper:#fffdf7;
  --paper-2:#f8f2e6;
  --ink:#27221b;
  --muted:#736b60;
  --line:#d3bd91;
  --line-strong:#b88849;
  --cinnabar:#9b2f22;
  --jade:#236b58;
  --lapis:#2d557c;
  --violet:#7a45a3;
  --gold:#a96f28;
  --shadow:0 18px 45px rgba(61,42,18,.14);
  --soft-shadow:0 8px 22px rgba(61,42,18,.09);
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{
  font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  color:var(--ink);
  min-height:100vh;
  display:grid;
  grid-template-columns:minmax(700px,760px) 310px;
  justify-content:center;
  align-items:start;
  gap:28px;
  padding:28px 24px 42px;
  background:
    radial-gradient(circle at 12% 10%,rgba(35,107,88,.14),transparent 28%),
    radial-gradient(circle at 88% 18%,rgba(155,47,34,.10),transparent 26%),
    linear-gradient(135deg,rgba(45,85,124,.08),transparent 38%),
    var(--bg);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(90deg,rgba(39,34,27,.028),rgba(39,34,27,.028) 1px,transparent 1px,transparent 5px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.35),rgba(255,255,255,.35) 1px,transparent 1px,transparent 7px);
  mix-blend-mode:multiply;
  opacity:.45;
}
.main-area{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:452px;
  width:100%;
  padding:2px 0 0;
}
h1{
  font-size:34px;
  margin-bottom:1px;
  color:var(--cinnabar);
  letter-spacing:8px;
  text-shadow:0 1px 0 rgba(255,255,255,.8);
}
.subtitle{
  color:var(--muted);
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:18px;
}
.page-switch{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-bottom:12px;
  padding:6px 12px;
  border:1px solid rgba(169,111,40,.34);
  border-radius:999px;
  background:rgba(255,253,247,.76);
  color:#70481a;
  text-decoration:none;
  font-size:12px;
  font-weight:bold;
  box-shadow:0 6px 16px rgba(61,42,18,.07);
}
.page-switch:hover{background:#fffaf0;border-color:var(--line-strong)}
.page-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
}
.page-actions .page-switch{margin-bottom:0}
.display-mode{
  display:grid;
  grid-template-columns:1fr 1fr;
  padding:2px;
  border:1px solid rgba(169,111,40,.34);
  border-radius:999px;
  background:rgba(255,253,247,.76);
  box-shadow:0 6px 16px rgba(61,42,18,.07);
}
.display-mode button{
  min-width:50px;
  min-height:26px;
  border:0;
  border-radius:999px;
  background:transparent;
  color:#70481a;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
}
.display-mode button.active{background:#74301f;color:#fffdf7}
body:not([data-display-mode="professional"]) .professional-only{display:none!important}
body[data-display-mode="professional"] .standard-only{display:none!important}
.reading-guide{
  margin:10px 0;
  padding:10px;
  border:1px solid var(--line);
  border-radius:6px;
  background:#fffaf0;
  color:#544534;
  font-size:12px;
  line-height:1.7;
}
.reading-guide h4{margin:0 0 6px;color:#963222;font-size:13px}
.reading-guide p{margin:4px 0}
.reading-guide strong{color:#7f2b20}
.reasoning-chain{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.reasoning-chain span{padding:3px 6px;border:1px solid #e1cda8;border-radius:5px;background:#fffdf7;color:#70481a;font-weight:bold}

.time-bar{
  width:min(100%,720px);
  display:flex;
  gap:7px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:16px;
  background:linear-gradient(180deg,rgba(255,253,247,.96),rgba(248,242,230,.96));
  padding:12px 16px;
  border:1px solid var(--line);
  border-radius:6px;
  box-shadow:var(--soft-shadow);
}
.time-bar button{
  background:#fffaf0;
  color:var(--ink);
  border:1px solid var(--line);
  min-height:30px;
  padding:5px 9px;
  border-radius:5px;
  cursor:pointer;
  font-weight:700;
  font-size:12px;
  transition:background .16s ease,border-color .16s ease,transform .16s ease;
}
.time-bar button:hover{background:#f4ead8;border-color:var(--line-strong);transform:translateY(-1px)}
.time-bar button.primary{
  background:linear-gradient(180deg,#9f3a27,#74301f);
  color:#fffdf7;
  border-color:#74301f;
  padding:6px 15px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22);
}
.time-bar button.primary:hover{background:linear-gradient(180deg,#b5432d,#7b311f)}
.time-bar select,.time-bar input{
  background:#fffdf8;
  color:var(--ink);
  border:1px solid var(--line);
  min-height:30px;
  padding:5px 7px;
  border-radius:5px;
  font-size:13px;
  outline:none;
}
.person-input{width:88px}
.time-bar select:focus,.time-bar input:focus,.question-bar input:focus{border-color:var(--lapis);box-shadow:0 0 0 3px rgba(45,85,124,.14)}
.cal-tabs{display:flex;gap:0}
.cal-tab{
  padding:6px 14px;
  cursor:pointer;
  font-size:12px;
  background:#ece3d1;
  color:#6f5840;
  border:1px solid var(--line);
  transition:background .16s ease,color .16s ease;
}
.cal-tab:first-child{border-radius:5px 0 0 5px}
.cal-tab:last-child{border-radius:0 5px 5px 0}
.cal-tab.active{background:var(--cinnabar);color:#fffdf7;font-weight:bold;border-color:var(--cinnabar)}

.solar-bar{
  width:min(100%,720px);
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:7px;
  margin:-8px auto 14px;
  padding:8px 12px;
  border:1px solid rgba(169,111,40,.25);
  border-radius:6px;
  background:rgba(255,253,247,.58);
  color:#51483d;
  font-size:12px;
}
.solar-bar label{display:inline-flex;align-items:center;gap:5px;font-weight:bold;color:var(--jade)}
.solar-bar input[type="checkbox"]{accent-color:var(--jade)}
.solar-bar input[type="number"],.solar-bar select{
  min-height:28px;
  border:1px solid var(--line);
  border-radius:5px;
  background:#fffdf8;
  color:var(--ink);
  padding:4px 7px;
  font-size:12px;
}
.solar-bar input[type="number"]{width:92px}
.solar-bar button{
  min-height:28px;
  border:1px solid var(--line);
  border-radius:5px;
  background:#fffaf0;
  color:#5c4731;
  padding:4px 8px;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
}
.solar-bar button:hover{background:#f4ead8;border-color:var(--line-strong)}
.solar-preview{color:#735f4a}

.status-strip{
  width:444px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:-4px auto 14px;
  justify-content:center;
}
.status-chip{
  display:inline-flex;
  align-items:center;
  gap:4px;
  min-height:26px;
  padding:4px 8px;
  background:rgba(255,253,247,.82);
  border:1px solid rgba(169,111,40,.26);
  border-radius:5px;
  color:#51483d;
  font-size:11px;
  box-shadow:0 4px 12px rgba(61,42,18,.06);
}
.status-chip strong{color:var(--cinnabar)}
.status-chip.warn{color:#855e16;background:#fff8df;border-color:#d8b35c}
.plate-freshness{
  width:444px;
  margin:-6px auto 12px;
  padding:8px 10px;
  border:1px solid #d8b35c;
  border-radius:5px;
  background:#fff8df;
  color:#755212;
  text-align:center;
  font-size:12px;
  font-weight:bold;
}

.board-wrap{
  position:relative;
  width:444px;
  height:444px;
  margin:0 auto 14px;
  padding:0;
  filter:drop-shadow(0 18px 28px rgba(61,42,18,.10));
}
.board-wrap:before{
  content:"";
  position:absolute;
  inset:-13px;
  border:1px solid rgba(169,111,40,.34);
  background:rgba(255,253,247,.34);
  border-radius:8px;
  z-index:-1;
}
.palace{
  position:absolute;
  width:140px;
  height:140px;
  background:
    linear-gradient(180deg,rgba(255,253,247,.98),rgba(247,241,229,.95)),
    radial-gradient(circle at 50% 45%,rgba(35,107,88,.04),transparent 58%);
  border:2px solid var(--line);
  border-radius:5px;
  cursor:pointer;
  transition:border-color .16s ease,box-shadow .16s ease,transform .16s ease,background .16s ease;
  overflow:hidden;
}
.palace:hover{border-color:var(--gold);box-shadow:0 10px 22px rgba(112,72,26,.17);transform:translateY(-2px);z-index:2}
.palace.selected{border-color:var(--cinnabar);box-shadow:0 0 0 3px rgba(155,47,34,.13),0 14px 28px rgba(155,47,34,.16);background:#fff8f2}

.palace-dir{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:70px;font-weight:bold;pointer-events:none;z-index:0;line-height:1}
#p1 .palace-dir{color:rgba(50,120,220,0.10)}  /* 坎·水·蓝 */
#p2 .palace-dir{color:rgba(140,90,40,0.10)}   /* 坤·土·棕 */
#p3 .palace-dir{color:rgba(40,140,60,0.10)}   /* 震·木·绿 */
#p4 .palace-dir{color:rgba(40,140,60,0.10)}   /* 巽·木·绿 */
#p5 .palace-dir{color:rgba(140,90,40,0.10)}   /* 中·土·棕 */
#p6 .palace-dir{color:rgba(190,150,30,0.10)}  /* 乾·金·金 */
#p7 .palace-dir{color:rgba(190,150,30,0.10)}  /* 兑·金·金 */
#p8 .palace-dir{color:rgba(140,90,40,0.10)}   /* 艮·土·棕 */
#p9 .palace-dir{color:rgba(200,50,50,0.10)}   /* 离·火·红 */

.p-ma{position:absolute;top:8px;left:10px;font-size:16px;z-index:2;line-height:1}
.p-spirit{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:13px;color:#9c27b0;font-weight:bold;z-index:2;line-height:1}
.p-kong{position:absolute;top:4px;right:10px;font-size:26px;color:#c0392b;font-weight:900;z-index:2;line-height:1}
.p-jigan{display:none}
.p-star{position:absolute;top:46%;left:48%;transform:translate(-50%,-50%);font-size:16px;color:#6d4c41;font-weight:bold;z-index:2;line-height:1;white-space:nowrap}
.p-heaven{position:absolute;top:46%;right:11px;transform:translateY(-55%);display:flex;flex-direction:column;align-items:center;z-index:2;line-height:1.1}
.p-yingan{position:absolute;top:46%;left:10px;font-size:11px;color:#888;z-index:2;line-height:1}
.p-heaven .cs{font-size:10px;color:rgba(58,47,31,0.4);margin-bottom:1px}
.p-heaven .stem{font-size:22px;font-weight:bold;color:#8b0000;line-height:1.15}
.p-heaven.double-stem{right:8px}
.p-heaven .stem.double-stem{display:flex;gap:3px;align-items:center;justify-content:center;white-space:nowrap}
.p-heaven .stem.double-stem>.stem{font-size:19px;line-height:1}
.p-num{position:absolute;bottom:8px;left:10px;font-size:14px;color:#8b4513;font-weight:bold;z-index:2;line-height:1}
.p-door{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:15px;font-weight:bold;color:#5d4037;z-index:2;line-height:1}
.p-earth{position:absolute;bottom:8px;right:11px;display:flex;flex-direction:column;align-items:center;z-index:2;line-height:1.1}
.p-earth .cs{font-size:10px;color:rgba(58,47,31,0.4);margin-bottom:1px}
.p-earth .stem{font-size:19px;font-weight:bold;color:#2e5c4e;line-height:1.15}
.p-earth .stem.double-stem{display:flex;gap:3px;align-items:center;white-space:nowrap}
.p-earth .stem.double-stem>.stem{font-size:18px;line-height:1}

.rizhu-box{border:2px solid #8b4513;border-radius:3px;padding:0 3px}
.jixing{color:#2563eb!important}
.rumu{color:#16a34a!important}
.jixing-rumu{color:#7c3aed!important}
.menpo{color:#dc2626!important}

#p4{top:6px;left:6px}#p9{top:6px;left:152px}#p2{top:6px;left:298px}
#p3{top:152px;left:6px}#p5{top:152px;left:152px}#p7{top:152px;left:298px}
#p8{top:298px;left:6px}#p1{top:298px;left:152px}#p6{top:298px;left:298px}

.question-bar{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:0;width:444px;flex-wrap:wrap}
.question-bar input{
  flex:1 0 100%;
  min-width:0;
  background:#fffdf8;
  color:var(--ink);
  border:1px solid var(--line);
  padding:12px 14px;
  border-radius:6px;
  font-size:13px;
  min-height:44px;
  outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
}
.question-bar button{
  flex:1 1 0;
  background:linear-gradient(180deg,#2c725f,#215746);
  color:#fff;
  border:1px solid #1f4d40;
  min-height:40px;
  padding:9px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  font-weight:bold;
  white-space:nowrap;
  box-shadow:var(--soft-shadow);
  transition:transform .16s ease,filter .16s ease;
}
.question-bar button:hover{filter:brightness(1.05);transform:translateY(-1px)}
.question-bar button:disabled{background:#9b9a92;border-color:#8a8982;cursor:not-allowed;box-shadow:none;transform:none}
.tool-row{
  width:444px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:0 auto 8px;
}
.tool-field{
  display:grid;
  gap:4px;
}
.tool-label{
  color:#806742;
  font-size:11px;
  font-weight:bold;
  line-height:1.2;
  padding-left:2px;
}
.tool-row select,.tool-row button{
  min-height:34px;
  border:1px solid var(--line);
  border-radius:6px;
  background:#fffdf8;
  color:var(--ink);
  padding:6px 8px;
  font-size:12px;
  font-weight:bold;
}
.tool-row button{cursor:pointer;color:#5c4731;background:#fffaf0}
.tool-row button:hover{background:#f4ead8;border-color:var(--line-strong)}
.quick-questions{
  width:444px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:0 auto 8px;
}
.quick-questions button{
  border:1px solid rgba(169,111,40,.34);
  background:rgba(255,253,247,.78);
  color:#5c4731;
  min-height:28px;
  padding:4px 9px;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
}
.quick-questions button:hover{background:#f4ead8;border-color:var(--line-strong)}

.info-panel{
  width:444px;
  min-height:68px;
  background:linear-gradient(180deg,#fffdf8,#faf3e7);
  border:1px solid var(--line);
  border-radius:6px;
  padding:14px 16px;
  margin-top:12px;
  font-size:12px;
  line-height:1.75;
  box-shadow:var(--soft-shadow);
}
.info-panel .title{color:var(--cinnabar);font-weight:bold;margin-bottom:4px;font-size:13px}
.info-panel .detail{color:#5b5147}
.info-panel .ai{color:var(--jade);margin-top:9px;padding-top:9px;border-top:1px dashed rgba(169,111,40,.38);white-space:pre-wrap;line-height:1.8}
.mini-section{margin-top:9px;padding-top:8px;border-top:1px dashed rgba(169,111,40,.28)}
.mini-section strong{color:var(--cinnabar)}
.hint-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.hint-tag{font-size:11px;color:#70481a;background:#fffaf0;border:1px solid rgba(169,111,40,.25);border-radius:4px;padding:2px 6px}
.followups{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.followups button{border:1px solid rgba(169,111,40,.34);background:#fffdf8;color:#5c4731;border-radius:5px;padding:4px 8px;font-size:12px;cursor:pointer}
.followups button:hover{background:#f4ead8;border-color:var(--line-strong)}
.ai-chat{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px;padding-top:9px;border-top:1px dashed rgba(169,111,40,.28);white-space:normal}
.ai-chat input{min-width:0;border:1px solid rgba(169,111,40,.34);border-radius:6px;background:#fffdf8;color:var(--ink);padding:8px 10px;font-size:13px;outline:none}
.ai-chat input:focus{border-color:var(--jade);box-shadow:0 0 0 3px rgba(46,92,78,.12)}
.ai-chat button{border:1px solid var(--jade);background:var(--jade);color:#fffdf7;border-radius:6px;padding:0 14px;font-size:13px;font-weight:bold;cursor:pointer}
.ai-chat button:hover{filter:brightness(1.05)}

.side-panel{
  position:sticky;
  top:24px;
  z-index:1;
  width:310px;
  flex-shrink:0;
  background:linear-gradient(180deg,rgba(255,253,247,.98),rgba(249,244,235,.98));
  border:1px solid var(--line);
  border-radius:7px;
  padding:18px;
  box-shadow:var(--shadow);
  max-height:calc(100vh - 48px);
  overflow-y:auto;
}
.side-panel h3{
  color:var(--cinnabar);
  font-size:16px;
  margin-bottom:14px;
  padding-bottom:9px;
  border-bottom:1px solid rgba(169,111,40,.25);
  letter-spacing:1px;
}
.side-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  margin-bottom:12px;
}
.side-tab{
  border:1px solid rgba(169,111,40,.30);
  background:#fffaf0;
  color:#5c4731;
  border-radius:5px;
  padding:6px 4px;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}
.side-tab.active{background:var(--cinnabar);border-color:var(--cinnabar);color:#fffdf7}
.side-tab-panel{display:none}
.side-tab-panel.active{display:block}
.info-row{display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-bottom:1px solid rgba(169,111,40,.18);font-size:12px}
.info-label{color:var(--muted)}
.info-value{font-weight:bold;color:var(--ink);text-align:right}
.legend{margin-top:14px}
.legend h4{font-size:12px;color:var(--cinnabar);margin-bottom:8px}
.legend-item{font-size:11px;color:#51483d;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
.side-focus{
  margin-bottom:12px;
  padding:10px 11px;
  background:#fff8ed;
  border:1px solid rgba(155,47,34,.28);
  border-radius:6px;
}
.side-focus .focus-title{font-weight:bold;color:var(--cinnabar);font-size:13px;margin-bottom:7px}
.side-focus .focus-line{font-size:11px;color:#51483d;line-height:1.7}
.mark-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.mark-tag{font-size:10px;color:#70481a;background:#fffdf8;border:1px solid rgba(169,111,40,.28);border-radius:4px;padding:2px 5px}

.gz-table{width:100%;text-align:center;border-collapse:separate;border-spacing:3px;font-size:12px;margin:10px 0}
.gz-table th{color:var(--muted);font-size:10px;padding:2px 4px;font-weight:700}
.gz-table td{background:rgba(255,255,255,.58);border:1px solid rgba(169,111,40,.20);border-radius:4px}
.gz-table .gz-t{font-weight:bold;color:#8b1111;padding:4px 6px}
.gz-table .gz-d{font-weight:bold;color:var(--jade);padding:4px 6px}
.gz-table .rizhu-td{border:2px solid var(--cinnabar)!important;border-radius:4px}
.hist-item{
  padding:7px 8px;
  margin-bottom:6px;
  background:#fffaf0;
  border-radius:5px;
  font-size:11px;
  cursor:pointer;
  border:1px solid rgba(169,111,40,.24);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
}
.hist-item:hover{background:#f4ead8;border-color:var(--line-strong)}
.hist-item .hi-name{flex:1;color:var(--ink);font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-item .hi-date{font-size:9px;color:var(--muted);margin-right:2px}
.hist-item .hi-btns{display:flex;gap:3px;margin-left:4px}

<script src="qimen.js?v=20260703-jieqi1"></script>
<script>
var currentCal='solar',selectedPalace=null,plateData=null;
var aiHistory=[];
var aiTopic=null;
var currentAutoHistoryId=null;
var API_KEY_STORAGE='qimen_deepseek_api_key';
var AUTO_HISTORY_STORAGE='qimen_auto_history';
var SAVED_HISTORY_STORAGE='qimen_history';
var AI_MODE_STORAGE='qimen_ai_mode';
var TRUE_SOLAR_STORAGE='qimen_true_solar_enabled';
var LONGITUDE_STORAGE='qimen_longitude';
var DISPLAY_MODE_STORAGE='analysis_display_mode';
var plateInputFingerprint='';
var qimenAiRequestSeq=0;

(function init(){
  var m=document.getElementById('month'),d=document.getElementById('day'),h=document.getElementById('hour');
  for(var i=1;i<=12;i++) m.appendChild(new Option(i,i));
  for(var i=0;i<=23;i++) h.appendChild(new Option(i+'时',i));
  for(var i=0;i<60;i++) document.getElementById('minute').appendChild(new Option(i+'分',i));
  document.getElementById('year').addEventListener('change',function(){updateDayOptions();refreshSolarPreview();markPlateDirty()});
  document.getElementById('month').addEventListener('change',function(){updateDayOptions();refreshSolarPreview();markPlateDirty()});
  ['day','hour','minute'].forEach(function(id){document.getElementById(id).addEventListener('change',function(){refreshSolarPreview();markPlateDirty()})});
  ['gender','personName'].forEach(function(id){document.getElementById(id).addEventListener('change',markPlateDirty)});
  document.getElementById('question').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();analyzeWithAI()}});
  setControlTitles();
  initDisplayMode();
  loadAiMode();
  loadSolarSettings();
  useCurrentTime();
  buildBoard();
  setTimeout(function(){doPaiPan({skipRecord:true})},100);
})();

function initDisplayMode(){
  var saved=localStorage.getItem(DISPLAY_MODE_STORAGE);
  setDisplayMode(saved==='professional'?'professional':'standard',false);
}
function setDisplayMode(mode,persist){
  mode=mode==='professional'?'professional':'standard';
  document.body.setAttribute('data-display-mode',mode);
  document.querySelectorAll('[data-display-mode]').forEach(function(btn){btn.classList.toggle('active',btn.getAttribute('data-display-mode')===mode)});
  if(persist!==false)localStorage.setItem(DISPLAY_MODE_STORAGE,mode);
}

function setControlTitles(){
  var titles={year:'公历年份',month:'公历月份',day:'公历日期',hour:'时辰小时',minute:'分钟',gender:'求测人性别'};
  for(var id in titles){var el=document.getElementById(id);if(el)el.title=titles[id]}
}

function useCurrentTime(){
  setControlsFromDate(new Date());
  markPlateDirty();
}
function daysInMonth(year,month){return new Date(year,month,0).getDate()}
function updateDayOptions(preferredDay){
  var y=parseInt(document.getElementById('year').value)||new Date().getFullYear();
  var m=parseInt(document.getElementById('month').value)||1;
  var d=document.getElementById('day');
  var keep=preferredDay||parseInt(d.value)||1;
  var max=daysInMonth(y,m);
  d.innerHTML='';
  for(var i=1;i<=max;i++)d.appendChild(new Option(i,i));
  d.value=Math.min(keep,max);
}
function switchCal(t){
  if(t==='lunar'){
    alert('农历转换暂未接入。为避免误用，目前仍按公历起盘。');
    t='solar';
  }
  currentCal=t;
  document.getElementById('tabSolar').classList.toggle('active',t==='solar');
  document.getElementById('tabLunar').classList.toggle('active',t==='lunar');
  markPlateDirty();
}
function currentPlateInputFingerprint(){
  var t=getTimeInput();
  return JSON.stringify({
    calendar:currentCal,
    time:[t.year,t.month,t.day,t.hour,t.minute],
    gender:document.getElementById('gender').value,
    person:getPersonName(),
    trueSolar:document.getElementById('useTrueSolar').checked,
    longitude:Number(getLongitude()).toFixed(5)
  });
}
function setPlateActionsDisabled(disabled){
  ['btnAI','btnCopy','btnExport','btnSave'].forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=!!disabled});
}
function markPlateDirty(){
  if(!plateData||!plateInputFingerprint)return;
  var dirty=currentPlateInputFingerprint()!==plateInputFingerprint;
  var note=document.getElementById('plateFreshness');
  if(note)note.hidden=!dirty;
  setPlateActionsDisabled(dirty);
  if(dirty)qimenAiRequestSeq++;
}
function ensureCurrentPlate(){
  if(!plateData){alert('请先起盘');return false}
  if(!plateInputFingerprint||currentPlateInputFingerprint()!==plateInputFingerprint){
    markPlateDirty();
    alert('时间或起盘设置已改变，请重新点击「起盘」。');
    return false;
  }
  return true;
}
function getTimeInput(){
  var y=parseInt(document.getElementById('year').value),m=parseInt(document.getElementById('month').value),d=parseInt(document.getElementById('day').value),h=parseInt(document.getElementById('hour').value),mi=parseInt(document.getElementById('minute').value);
  y=isNaN(y)?2026:y;m=isNaN(m)?5:m;d=isNaN(d)?21:d;
  var max=daysInMonth(y,m);
  if(d>max)d=max;
  updateDayOptions(d);
  return{year:y,month:m,day:d,hour:isNaN(h)?12:h,minute:isNaN(mi)?0:mi};
}
function setControlsFromDate(dt){
  document.getElementById('year').value=dt.getFullYear();
  document.getElementById('month').value=dt.getMonth()+1;
  updateDayOptions(dt.getDate());
  document.getElementById('day').value=dt.getDate();
  document.getElementById('hour').value=dt.getHours();
  document.getElementById('minute').value=dt.getMinutes();
  refreshSolarPreview();
}
function setControlsFromTime(t){
  document.getElementById('year').value=t.year;
  document.getElementById('month').value=t.month;
  updateDayOptions(t.day);
  document.getElementById('day').value=t.day;
  document.getElementById('hour').value=t.hour;
  document.getElementById('minute').value=t.minute||0;
  refreshSolarPreview();
}
function shiftHour(delta){
  var t=getTimeInput();
  var dt=new Date(t.year,t.month-1,t.day,t.hour+(delta||0),t.minute||0);
  setControlsFromDate(dt);
  doPaiPan({skipRecord:true});
}

function dayOfYear(y,m,d){
  return Math.floor((new Date(y,m-1,d)-new Date(y,0,0))/(1000*60*60*24));
}
function equationOfTimeMinutes(y,m,d){
  var n=dayOfYear(y,m,d);
  var b=2*Math.PI*(n-81)/364;
  return 9.87*Math.sin(2*b)-7.53*Math.cos(b)-1.5*Math.sin(b);
}
function getLongitude(){
  var lon=parseFloat(document.getElementById('longitude').value);
  return isNaN(lon)?103.99505:lon;
}
function formatOffset(mins){
  var n=Math.round(mins),abs=Math.abs(n),h=Math.floor(abs/60),m=abs%60;
  return (n<0?'往回 ':'往后 ')+(h?h+'小时':'')+(m||!h?m+'分钟':'');
}
function addMinutesToInput(t,mins){
  var dt=new Date(t.year,t.month-1,t.day,t.hour,t.minute+Math.round(mins));
  return {year:dt.getFullYear(),month:dt.getMonth()+1,day:dt.getDate(),hour:dt.getHours(),minute:dt.getMinutes()};
}
function getTrueSolarCorrection(t){
  if(!document.getElementById('useTrueSolar').checked)return 0;
  return (getLongitude()-120)*4+equationOfTimeMinutes(t.year,t.month,t.day);
}
function getPaiPanTime(t){
  var correction=getTrueSolarCorrection(t);
  var used=addMinutesToInput(t,correction);
  return {input:t,used:used,correction:correction,enabled:document.getElementById('useTrueSolar').checked,longitude:getLongitude()};
}
function formatTimeObj(t){
  return t.year+'-'+pad(t.month)+'-'+pad(t.day)+' '+pad(t.hour)+':'+pad(t.minute||0);
}
function refreshSolarPreview(){
  var el=document.getElementById('solarPreview');
  if(!el)return;
  var t=getTimeInput();
  if(!document.getElementById('useTrueSolar').checked){
    el.textContent='未启用真太阳时';
    return;
  }
  var pp=getPaiPanTime(t);
  el.textContent='校正 '+formatOffset(pp.correction)+'，起盘用 '+pad(pp.used.hour)+':'+pad(pp.used.minute);
}
function loadSolarSettings(){
  var lon=localStorage.getItem(LONGITUDE_STORAGE)||'103.99505';
  document.getElementById('useTrueSolar').checked=localStorage.getItem(TRUE_SOLAR_STORAGE)==='1';
  document.getElementById('longitude').value=lon;
}
function saveSolarSettings(){
  localStorage.setItem(TRUE_SOLAR_STORAGE,document.getElementById('useTrueSolar').checked?'1':'0');
  localStorage.setItem(LONGITUDE_STORAGE,String(getLongitude()));
}
function applyLocationPreset(v){
  if(v){
    document.getElementById('longitude').value=v;
    saveSolarSettings();
  }
  refreshSolarPreview();
  markPlateDirty();
}
function useBrowserLocation(){
  if(!navigator.geolocation){alert('当前浏览器不支持定位。');return}
  navigator.geolocation.getCurrentPosition(function(pos){
    document.getElementById('longitude').value=pos.coords.longitude.toFixed(5);
    document.getElementById('locationPreset').value='';
    saveSolarSettings();
    refreshSolarPreview();
    markPlateDirty();

function getJieQiNote(t){
  if(typeof JIE_QI_DATA==='undefined')return '';
  for(var i=0;i<JIE_QI_DATA.length;i++){
    var jq=JIE_QI_DATA[i];
    if(jq.month===t.month&&Math.abs(t.day-jq.approx[0])<=1){
      return '⚠ 当前日期接近「'+jq.name+'」交节，本工具按日期近似处理；交节当天请以准确节气时刻复核。';
    }
  }
  return '';
}

function getPalaceMarks(o){
  var marks=[];
  if(o.kongWang)marks.push('旬空');
  if(o.maXing)marks.push('马星');
  if(o.menPo)marks.push('门迫');
  if(o.jiXingTian)marks.push('天盘击刑');
  if(o.jiXingDi)marks.push('地盘击刑');
  if(o.ruMuTian)marks.push('天盘入墓');
  if(o.ruMuDi)marks.push('地盘入墓');
  if(o.isRiZhuTian)marks.push('日主在天盘');
  else if(o.isRiZhuDi)marks.push('日主在地盘');

}

function getRiskWarnings(data,note){
  var risks=[];
  if(note)risks.push(note);
  var input=data.inputTime||data.solarTime;
  if(input.hour>=23)risks.push('23点后按子初换日，已用次日日柱起盘。');
  if(data.trueSolar&&data.trueSolar.enabled){
    var inHour=input.hour,usedHour=data.solarTime.hour;
    if(inHour!==usedHour)risks.push('真太阳时校正后跨时辰，请按“起盘用时”判断。');
  }
  var dm=findDayMasterPalace(data);
  if(dm&&data.gongs[dm].kongWang)risks.push('日主落宫逢空亡。');
  for(var g=1;g<=9;g++){
    var o=data.gongs[g];
    if(o.menPo)risks.push(getPalaceLabel(g)+'门迫');
    if(o.jiXingTian||o.jiXingDi)risks.push(getPalaceLabel(g)+'击刑');
    if(o.ruMuTian||o.ruMuDi)risks.push(getPalaceLabel(g)+'入墓');
  }
  var seen={};
  return risks.filter(function(x){if(seen[x])return false;seen[x]=1;return true}).slice(0,8);
}

  if(!data)return '';

}

function renderPlate(data){
  for(var g=1;g<=9;g++){
    var o=data.gongs[g],p=document.getElementById('p'+g);
    if(!p)continue;
    p.title=palaceTitle(g,o);
    p.setAttribute('role','button');
    p.setAttribute('aria-label',palaceTitle(g,o));
    p.querySelector('.p-ma').textContent=o.maXing?'🐴':'';
    p.querySelector('.p-spirit').textContent=o.spirit||'';
    p.querySelector('.p-kong').textContent=o.kongWang?'○':'';
    p.querySelector('.p-jigan').textContent='';
    p.querySelector('.p-star').textContent=o.star==='天芮,天禽'?'芮禽':(o.star||'');
    p.querySelector('.p-yingan').textContent=o.yinGan||'';
    p.querySelector('.p-num').textContent=['','①','②','③','④','⑤','⑥','⑦','⑧','⑨'][g];
    var hs=p.querySelector('.p-heaven .cs');
    var st=p.querySelector('.p-heaven .stem');
    var heavenBox=p.querySelector('.p-heaven');
    hs.textContent=o.changShengTian||'';
    var tp=o.tianPan||'';
    heavenBox.className='p-heaven';
    if(tp.length===2){
      var jxT=o.jxTianStems||[];
      var rmT=o.rmTianStems||[];
      var h='';
      for(var si=0;si<2;si++){
        var cls='stem';
        if(o.isRiZhuTian && tp[si]===data.riZhu)cls+=' rizhu-box';
        if(jxT[si]&&rmT[si])cls+=' jixing-rumu';
        else if(jxT[si])cls+=' jixing';
        else if(rmT[si])cls+=' rumu';
        h+='<span class="'+cls+'">'+tp[si]+'</span>';
      }
      heavenBox.classList.add('double-stem');
      st.className='stem double-stem';
      st.innerHTML=h;
    }else{
      st.textContent=tp;
      st.className='stem';
      if(o.isRiZhuTian)st.classList.add('rizhu-box');
      if(o.jiXingTian&&o.ruMuTian)st.classList.add('jixing-rumu');
      else if(o.jiXingTian)st.classList.add('jixing');
      else if(o.ruMuTian)st.classList.add('rumu');
    }
    var doorEl=p.querySelector('.p-door');
    doorEl.textContent=o.door?o.door+'门':'';
    doorEl.className='p-door'+(o.menPo?' menpo':'');
    var eds=p.querySelector('.p-earth .cs');
    var edt=p.querySelector('.p-earth .stem');
    eds.textContent=o.changShengDi||'';
    var ep=palaceStemText(g,o);
    if(g===2&&o.jigan&&o.jxDiStems&&o.jxDiStems.length===2){
      var eh='';
      for(var ei=0;ei<2;ei++){
        var ecls='stem';
        if(o.jxDiStems[ei]&&o.rmDiStems[ei])ecls+=' jixing-rumu';
        else if(o.jxDiStems[ei])ecls+=' jixing';
        else if(o.rmDiStems[ei])ecls+=' rumu';
        eh+='<span class="'+ecls+'">'+ep[ei]+'</span>';
      }
      edt.className='stem double-stem';
      edt.innerHTML=eh;
    }else{
      edt.textContent=ep;
      edt.className='stem';
            if(o.jiXingDi&&o.ruMuDi)edt.classList.add('jixing-rumu');
      else if(o.jiXingDi)edt.classList.add('jixing');
      else if(o.ruMuDi)edt.classList.add('rumu');
    }
    if(g===5)p.style.opacity='0.72';
  }
}

function pad(n){var m=n||0;return(m<10?'0':'')+m}

function buildPlateText(data){
  if(!data)return '';
  var dirs=['','坎','坤','震','巽','中','乾','兑','艮','离'];
  var lines=[];
  lines.push('奇门遁甲排盘');
  var person=(data.personName||getPersonName());
  if(person)lines.push('姓名/标记：'+person);
  if(data.trueSolar&&data.trueSolar.enabled){
    lines.push('输入时间：'+formatTimeObj(data.inputTime));
    lines.push('真太阳时：东经 '+Number(data.trueSolar.longitude).toFixed(5)+'°，校正 '+formatOffset(data.trueSolar.correction));
    lines.push('起盘用时：'+formatTimeObj(data.solarTime));
  }else{
    lines.push('时间：'+data.solarTime.year+'-'+pad(data.solarTime.month)+'-'+pad(data.solarTime.day)+' '+pad(data.solarTime.hour)+':'+pad(data.solarTime.minute||0));
  }
  lines.push('四柱：'+data.ganzhi.year+'年 '+data.ganzhi.month+'月 '+data.ganzhi.day+'日 '+data.ganzhi.hour+'时');
  lines.push('局式：'+data.juInfo.juShi+'，'+data.juInfo.jieQi+' '+data.juInfo.yuan+'，'+data.juInfo.dun+'遁'+data.juInfo.ju+'局');
  lines.push('旬首：'+data.juInfo.xunShou+data.juInfo.xunShouYi+'；值符：'+data.juInfo.zhiFu+'；值使：'+data.juInfo.zhiShi+'门');
  lines.push('旬空：'+data.kongWang.join(' ')+'；马星：'+data.maXing+'；日主：'+data.riZhu);
  lines.push('问事类型：'+getQuestionTypeLabel(getQuestionType())+'；AI模式：'+getAiModeLabel(document.getElementById('aiMode').value));
  lines.push('用神提示：'+getUseGodHints(getQuestionType()).join('、'));
  var risks=getRiskWarnings(data,getJieQiNote(data.solarTime));
  if(risks.length)lines.push('风险提醒：'+risks.join('；'));
  lines.push('');
  for(var g=1;g<=9;g++){
    var o=data.gongs[g],marks=getPalaceMarks(o);
    var dp=palaceStemText(g,o);
    lines.push('第'+g+'宫（'+dirs[g]+'·'+o.wuxing+'）：'+(o.spirit||'')+' '+(o.star||'')+' '+(o.door?o.door+'门':'')+' | 天盘'+(o.tianPan||'空')+' | 地盘'+dp+(o.yinGan?' | 隐干'+o.yinGan:'')+(marks.length?' | '+marks.join('、'):''));
  }
  var q=document.getElementById('question').value.trim();
  if(q)lines.push('\\n问题：'+q);
  return lines.join('\\n');
}

function copyFallback(text){
  var ta=document.createElement('textarea');
  ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
}

async function copyPlateText(){
  if(!ensureCurrentPlate())return;
  var text=buildPlateText(plateData);
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText)await navigator.clipboard.writeText(text);
    else copyFallback(text);
    var btn=document.getElementById('btnCopy'),old=btn.textContent;
    btn.textContent='✅ 已复制';
    setTimeout(function(){btn.textContent=old},1200);
  }catch(e){copyFallback(text);alert('盘面文字已复制。')}
}

function exportPlate(){
  if(!ensureCurrentPlate())return;
  window.print();
}

      renderSidePanel(plateData);
      renderStatus(plateData);

  }

async function analyzeWithAI(){
  if(!ensureCurrentPlate())return;
  var question=document.getElementById('question').value.trim();
  if(!question){alert('请输入你想问的事情');return}
  var apiKey=getApiKey();
  if(!apiKey){alert('未填写 DeepSeek API Key');return}
  var aiRequestId=++qimenAiRequestSeq;
  var aiRequestFingerprint=plateInputFingerprint;
  var gender=document.getElementById('gender').value;
  var qType=getQuestionType();
  var aiMode=document.getElementById('aiMode').value;
  var pendingTopic=aiTopic||{question:question,type:qType,person:getPersonName(),createdAt:new Date().toISOString()};
  var originalQuestion=pendingTopic.question||question;
  var dirs=['','坎','坤','震','巽','中','乾','兑','艮','离'];

  // 组装全盘信息
  var gongs=plateData.gongs;
  var plateInfo='';
  for(var g=1;g<=9;g++){
    var o=gongs[g];
    var marks=getPalaceMarks(o);
    plateInfo+='第'+g+'宫('+dirs[g]+'·'+o.wuxing+'): 天盘'+(o.tianPan||'空')+'('+(o.changShengTian||'')+') 地盘'+palaceStemText(g,o)+'('+(o.changShengDi||'')+') '+(o.star||'')+' '+(o.door||'')+' '+(o.spirit||'')+(o.yinGan?' 隐干'+o.yinGan:'')+(o.jigan?' 寄干'+o.jigan:'')+(marks.length?' ['+marks.join(',')+']':'')+'\n';
  }

  var modeGuide={
    brief:'请用简断方式，500字以内，先给结论，再列依据。',
    detail:'请详断，1000字以内，结构清楚，重点说理由。',
    conclusion:'只看结论和行动建议，300字以内，不展开固定分段。',
    palaces:'请逐宫细断，重点分析相关用神宫、日主宫、值符值使宫。',
    timing:'请重点看应期、时间窗口、动象和触发条件。'
  };
  var prompt='你是奇门遁甲专家，请结合全盘信息综合分析用户的问题。\n重要规则：日主/用神落宫=天盘干为日主的宫位（不是地盘干）。\n本盘原始问事：'+originalQuestion+'\n本次问题：'+question+'\n问事类型：'+getQuestionTypeLabel(qType)+'；重点用神提示：'+getUseGodHints(qType).join('、')+'；分析模式：'+getAiModeLabel(aiMode)+'。\n求测人性别：'+gender+'\n局式：'+plateData.juInfo.juShi+'，'+plateData.juInfo.jieQi+' '+plateData.juInfo.yuan+'，旬首'+plateData.juInfo.xunShou+plateData.juInfo.xunShouYi+'，值符'+plateData.juInfo.zhiFu+'，值使'+plateData.juInfo.zhiShi+'门\n八字：'+plateData.ganzhi.year+'年 '+plateData.ganzhi.month+'月 '+plateData.ganzhi.day+'日 '+plateData.ganzhi.hour+'时，日主'+plateData.riZhu+'\n旬空：'+plateData.kongWang.join(' ')+' 马星：'+plateData.maXing+'\n风险提醒：'+getRiskWarnings(plateData,getJieQiNote(plateData.solarTime)).join('；')+'\n\n全盘信息：\n'+plateInfo+'\n'+(modeGuide[aiMode]||modeGuide.brief);
  var systemPrompt='你是专业的奇门遁甲分析师。一个奇门盘只回答同一件事的连续追问。若“本次问题”不是围绕“本盘原始问事”的同一人、同一事、同一决策、同一关系或同一问题延伸，只回复：一个盘只能问同一件事。请重新起盘或回到原问题继续问。\n若属于同一件事，请根据问事类型、用户问题和所选分析模式自然组织回答，不要套用固定四段模板，也不要强制使用“用神落宫、全盘格局、关键宫位、综合建议”这些标题。需要详断时可以分段，需要简断或只看结论时直接给结论和关键依据。每段之间空一行，不用markdown符号。';
  var messages=[{role:'system',content:systemPrompt}];
  for(var i=0;i<aiHistory.length;i++){
    messages.push({role:'user',content:'追问：'+aiHistory[i].q});
    messages.push({role:'assistant',content:aiHistory[i].a});
  }
  messages.push({role:'user',content:prompt});
  document.getElementById('aiResult').innerHTML=renderAIHistory()+'<div>⏳ AI 分析中…</div>';
  var aiBtn=document.getElementById('btnAI');
  aiBtn.disabled=true;
  aiBtn.textContent='⏳ 分析中 · '+getAiModeLabel(aiMode);
  try{
    var resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:'deepseek-chat',messages:messages,max_tokens:1500,temperature:0.7})});
    var d=await resp.json();
    if(aiRequestId!==qimenAiRequestSeq||aiRequestFingerprint!==plateInputFingerprint||currentPlateInputFingerprint()!==plateInputFingerprint)return;
    if(d.choices&&d.choices[0]){
      if(!aiTopic)aiTopic=pendingTopic;
      aiHistory.push({q:question,a:d.choices[0].message.content.replace(/\*\*/g,''),t:new Date().toLocaleTimeString()});
      updateCurrentAutoHistory();
      document.getElementById('aiResult').innerHTML=renderAIHistory();
    }else{
      document.getElementById('aiResult').innerHTML=renderAIHistory()+'<div>❌ AI 返回异常: '+esc(JSON.stringify(d))+'</div>';
    }
  }catch(e){
    if(aiRequestId===qimenAiRequestSeq&&aiRequestFingerprint===plateInputFingerprint)document.getElementById('aiResult').innerHTML=renderAIHistory()+'<div>❌ 请求失败: '+esc(e.message)+'</div>';
  }finally{
    if(aiRequestId===qimenAiRequestSeq){aiBtn.disabled=false;updateAiButtonLabel()}
  }
}

    '<input id="followupQuestion" type="text" placeholder="继续追问这个盘里的同一件事..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();askFollowupFromChat()}">'+

function setFollowupQuestion(text){
  var input=document.getElementById('followupQuestion')||document.getElementById('question');
  input.value=text;
  input.focus();
}

function askFollowupFromChat(){
  var chat=document.getElementById('followupQuestion');
  var main=document.getElementById('question');
  var text=(chat&&chat.value.trim())||'';
  if(!text){if(chat)chat.focus();return}
  main.value=text;

// ===== 记录与保存 =====
function setSideTab(tab){
  var map={info:'sideContent',auto:'autoHistorySection',saved:'historySection'};
  var btns={info:'tabInfoPanel',auto:'tabAutoHistory',saved:'tabSavedHistory'};
  Object.keys(map).forEach(function(k){
    var panel=document.getElementById(map[k]),btn=document.getElementById(btns[k]);
    if(panel)panel.classList.toggle('active',k===tab);
    if(btn)btn.classList.toggle('active',k===tab);
  });
}
function makeRecordName(data,question){
  var person=data.personName||getPersonName();
  var tag=getQuestionTypeLabel(getQuestionType());
  var t=data.solarTime;
  var q=(question||'').trim();
  if(q.length>24)q=q.slice(0,24)+'...';
  return (person?person+' ':'')+'['+tag+'] '+(q||t.year+'-'+pad(t.month)+'-'+pad(t.day)+' '+data.ganzhi.day+'日 '+data.ganzhi.hour+'时');
}
function getRecords(key){
  try{return JSON.parse(localStorage.getItem(key)||'[]')}catch(e){return []}
}
function setRecords(key,items){
  localStorage.setItem(key,JSON.stringify(items));
}
function currentQuestionText(){
  var el=document.getElementById('question');
  return el?el.value.trim():'';
}
function addAutoHistory(){
  if(!plateData)return;
  var hist=getRecords(AUTO_HISTORY_STORAGE);
  var id=Date.now();
  var q=currentQuestionText();
  hist.push({
    id:id,
    name:makeRecordName(plateData,q),
    person:plateData.personName||'',
    tag:getQuestionTypeLabel(getQuestionType()),
    questionType:getQuestionType(),
    question:q,
    gender:plateData.gender||document.getElementById('gender').value,
    currentCal:plateData.currentCal||currentCal,
    solarTime:plateData.solarTime,
    data:JSON.parse(JSON.stringify(plateData)),
    aiTopic:aiTopic?JSON.parse(JSON.stringify(aiTopic)):null,
    aiHistory:JSON.parse(JSON.stringify(aiHistory)),
    createdAt:new Date().toISOString()
  });
  if(hist.length>60)hist=hist.slice(hist.length-60);
  setRecords(AUTO_HISTORY_STORAGE,hist);
  currentAutoHistoryId=id;
  renderAutoHistory();
}
function updateCurrentAutoHistory(){
  if(!plateData)return;
  if(!currentAutoHistoryId){addAutoHistory();return}
  var hist=getRecords(AUTO_HISTORY_STORAGE);
  var item=hist.find(function(h){return h.id===currentAutoHistoryId});
  if(!item){addAutoHistory();return}
  var recordQuestion=(aiTopic&&aiTopic.question)||currentQuestionText();
  item.name=makeRecordName(plateData,recordQuestion);
  item.person=plateData.personName||getPersonName();
  item.tag=getQuestionTypeLabel(getQuestionType());
  item.questionType=getQuestionType();
  item.question=recordQuestion;
  item.gender=plateData.gender||document.getElementById('gender').value;
  item.currentCal=plateData.currentCal||currentCal;
  item.solarTime=plateData.solarTime;
  item.data=JSON.parse(JSON.stringify(plateData));
  item.aiTopic=aiTopic?JSON.parse(JSON.stringify(aiTopic)):null;
  item.aiHistory=JSON.parse(JSON.stringify(aiHistory));
  item.updatedAt=new Date().toISOString();
  setRecords(AUTO_HISTORY_STORAGE,hist);
  renderAutoHistory();
}
function saveToHistory(){
  if(!ensureCurrentPlate())return;

  var tag=getQuestionTypeLabel(getQuestionType());

function loadHistory(id,kind){
  var hist=getRecords(kind==='auto'?AUTO_HISTORY_STORAGE:SAVED_HISTORY_STORAGE);
  var item=hist.find(function(h){return h.id===id});
  if(!item)return;
  qimenAiRequestSeq++;
  plateData=item.data;
  aiHistory=item.aiHistory?JSON.parse(JSON.stringify(item.aiHistory)):[];
  aiTopic=item.aiTopic?JSON.parse(JSON.stringify(item.aiTopic)):(aiHistory[0]?{question:aiHistory[0].q,type:item.questionType||'general',person:item.person||'',createdAt:item.createdAt||''}:null);
  currentAutoHistoryId=kind==='auto'?item.id:null;
  if(item.questionType&&document.getElementById('questionType'))document.getElementById('questionType').value=item.questionType;
  if(document.getElementById('question'))document.getElementById('question').value=item.question||'';
  if(document.getElementById('personName'))document.getElementById('personName').value=item.person||plateData.personName||'';
  plateData.gender=item.gender||plateData.gender||'男';
  plateData.currentCal=item.currentCal||plateData.currentCal||'solar';
  document.getElementById('gender').value=plateData.gender;
  currentCal=plateData.currentCal;
  document.getElementById('tabSolar').classList.toggle('active',currentCal==='solar');
  document.getElementById('tabLunar').classList.toggle('active',currentCal==='lunar');
  selectedPalace=null;
  setControlsFromTime(plateData.inputTime||plateData.solarTime);
  var ts=plateData.trueSolar||{enabled:false,longitude:getLongitude()};
  document.getElementById('useTrueSolar').checked=!!ts.enabled;
  document.getElementById('longitude').value=ts.longitude||getLongitude();
  saveSolarSettings();
  refreshSolarPreview();
  renderPlate(plateData);
  renderSidePanel(plateData);
  renderStatus(plateData);
  plateInputFingerprint=currentPlateInputFingerprint();
  var freshness=document.getElementById('plateFreshness');
  if(freshness)freshness.hidden=true;
  setPlateActionsDisabled(false);
  var solarNote=plateData.trueSolar&&plateData.trueSolar.enabled?'真太阳时：输入 '+formatTimeObj(plateData.inputTime)+'，校正 '+formatOffset(plateData.trueSolar.correction)+'，起盘用 '+formatTimeObj(plateData.solarTime)+'。':'';
  setSideTab('info');
  document.getElementById('infoPanel').innerHTML='<div class="title">📜 已加载'+(kind==='auto'?'起盘记录':'保存起盘')+' — '+esc(item.name)+'</div><div class="detail">'+plateData.juInfo.juShi+' | '+plateData.juInfo.jieQi+' '+plateData.juInfo.yuan+' | 日主: '+plateData.riZhu+'</div>'+(solarNote?'<div class="detail">'+solarNote+'</div>':'')+renderAssistInfo(plateData,getJieQiNote(plateData.solarTime))+'<div class="ai" id="aiResult">'+renderAIHistory()+'</div>';
}

function renameHistory(id,kind){
  var key=kind==='auto'?AUTO_HISTORY_STORAGE:SAVED_HISTORY_STORAGE;
  var hist=getRecords(key);
  var item=hist.find(function(h){return h.id===id});
  if(!item)return;
  var name=prompt('重命名：',item.name);
  if(!name)return;
  item.name=name;
  setRecords(key,hist);
  kind==='auto'?renderAutoHistory():renderHistory();
}

function deleteHistory(id,kind){
  if(!confirm('确定删除这条记录？'))return;
  var key=kind==='auto'?AUTO_HISTORY_STORAGE:SAVED_HISTORY_STORAGE;
  var hist=getRecords(key);
  hist=hist.filter(function(h){return h.id!==id});
  setRecords(key,hist);
  kind==='auto'?renderAutoHistory():renderHistory();
}

function renderRecordList(kind){
  var key=kind==='auto'?AUTO_HISTORY_STORAGE:SAVED_HISTORY_STORAGE;
  var list=document.getElementById(kind==='auto'?'autoHistoryList':'historyList');
  var search=document.getElementById(kind==='auto'?'autoHistorySearch':'historySearch');
  var hist=getRecords(key);
  if(!list)return;
  if(!hist.length){
    list.innerHTML='<div style="font-size:11px;color:#999;padding:10px;text-align:center">'+(kind==='auto'?'暂无起盘记录':'暂无保存起盘')+'</div>';
    return;
  }
  var kw=(search&&search.value||'').trim().toLowerCase();
  var html='';
  for(var i=hist.length-1;i>=0;i--){
    var h=hist[i];
    var hid=Number(h.id)||0;
    var text=(h.name+' '+(h.tag||'')+' '+(h.person||'')+' '+(h.question||'')+' '+h.solarTime.year+'-'+pad(h.solarTime.month)+'-'+pad(h.solarTime.day)).toLowerCase();
    if(kw&&text.indexOf(kw)<0)continue;
    html+='<div class="hist-item">'+
      '<span class="hi-date">'+(h.tag?'['+esc(h.tag)+'] ':'')+h.solarTime.year+'-'+pad(h.solarTime.month)+'-'+pad(h.solarTime.day)+'</span>'+
      '<span class="hi-name" title="'+esc(h.name)+'" onclick="loadHistory('+hid+',\''+kind+'\')">'+esc(h.name)+'</span>'+
      '<span class="hi-btns">'+
        '<button onclick="event.stopPropagation();renameHistory('+hid+',\''+kind+'\')">✏</button>'+
        '<button class="del" onclick="event.stopPropagation();deleteHistory('+hid+',\''+kind+'\')">✕</button>'+
      '</span></div>';
  }
  list.innerHTML=html||'<div style="font-size:11px;color:#999;padding:8px;text-align:center">没有匹配的记录</div>';
}
function renderHistory(){
  renderRecordList('saved');
}
function renderAutoHistory(){
  renderRecordList('auto');
}

// 初始化
(function initHistory(){
  renderAutoHistory();
  renderHistory();
})();
</script>
</body>
