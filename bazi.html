<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
<title>八字分析 - 四柱排盘</title>
<style>
:root{
  --bg:#f2f2f4;
  --card:#fff;
  --soft:#fbfaf7;
  --ink:#23201d;
  --muted:#7a746c;
  --line:#ded7c8;
  --gold:#b49350;
  --gold-soft:#f6efe1;
  --black:#050505;
  --red:#9b2f22;
  --green:#236b58;
  --shadow:0 18px 52px rgba(28,24,18,.08);
  --wood:#17925f;
  --fire:#c43b32;
  --earth:#a96f28;
  --metal:#9a7a1d;
  --water:#1774d1;
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  color:var(--ink);
  font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:
    radial-gradient(circle at 20% 0%,rgba(180,147,80,.12),transparent 28%),
    linear-gradient(180deg,#f4f4f6 0%,#ededf0 100%);
}
button,input,select{font:inherit}
.page{max-width:1020px;margin:0 auto;padding:28px 16px 48px}
.top{text-align:center;margin-bottom:18px}
.top-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.back{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  padding:0 14px;
  border:1px solid rgba(180,147,80,.42);
  border-radius:999px;
  background:rgba(255,255,255,.82);
  color:#7a5b25;
  text-decoration:none;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}
h1{margin:0;font-size:32px;letter-spacing:3px;color:#222}
.sub{margin-top:7px;color:#777;font-size:14px;letter-spacing:2px}
.life-note{margin:8px 0 0;color:#998e80;font-size:12px;line-height:1.6}
.entry-card,.result-card,.core-card{
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.entry-card{
  max-width:690px;
  margin:0 auto 18px;
  padding:34px 42px;
  border-radius:26px;
}
.entry-card summary{
  cursor:pointer;
  list-style:none;
  font-weight:900;
  color:var(--red);
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:-8px 0 4px;
}
.entry-card summary::-webkit-details-marker{display:none}
.entry-card summary::after{content:'展开';font-size:13px;color:var(--gold)}
.entry-card[open] summary::after{content:'收起'}
.basic-dashboard{display:grid;gap:16px;margin-bottom:16px}
.field{display:grid;grid-template-columns:96px 1fr;gap:14px;align-items:center;margin-bottom:18px}
.field>label{font-size:15px;color:#222}
.field input[type=text],.display-field,.editor-panel input,.editor-panel select,.ai-controls input,.ai-controls select,.ai-followup input{
  width:100%;
  min-height:40px;
  border:1px solid #ddd6c8;
  border-radius:8px;
  background:#fff;
  color:#222;
  padding:0 14px;
  outline:none;
}
.field input:focus,.display-field:focus,.editor-panel input:focus,.editor-panel select:focus,.ai-controls input:focus,.ai-controls select:focus,.ai-followup input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(180,147,80,.16);
}
.display-field{text-align:left;cursor:pointer}
.segmented{display:flex;gap:30px;align-items:center}
.segmented label,.options label{display:inline-flex;gap:7px;align-items:center}
.segmented input,.options input{accent-color:var(--gold)}
.editor-panel{
  grid-column:2;
  margin-top:8px;
  border:1px solid #e8ddc8;
  border-radius:16px;
  background:#fffdf8;
  padding:12px;
}
.time-grid{display:grid;grid-template-columns:1.1fr repeat(4,1fr);gap:8px}
.location-list{display:grid;gap:8px;margin-top:10px}
.location-option{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  border:1px solid #eadfc9;
  border-radius:12px;
  background:#fff;
  padding:10px 12px;
  text-align:left;
  cursor:pointer;
}
.location-option:hover{border-color:var(--gold);background:#fffaf0}
.location-option span{font-size:12px;color:#746b60}
.custom-location{
  margin-top:10px;
  border-top:1px dashed #eadfc9;
  padding-top:10px;
}
.custom-title{font-size:12px;color:#806742;margin-bottom:8px;font-weight:700}
.custom-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px}
.custom-row input{
  width:100%;
  border:1px solid #eadfc9;
  border-radius:10px;
  padding:9px 10px;
  background:#fffdf8;
}
.custom-row button{
  border:1px solid var(--line);
  border-radius:10px;
  background:#fffaf0;
  color:#694a20;
  padding:0 12px;
  font-weight:800;
  cursor:pointer;
}
.options{display:flex;gap:24px;margin:10px 0 16px 110px;color:#333}
.solar-preview{
  margin-left:110px;
  color:#69727f;
  font-size:14px;
  line-height:1.8;
}
.build-btn{
  display:block;
  width:calc(100% - 110px);
  margin:28px 0 0 110px;
  border:0;
  border-radius:999px;
  background:var(--black);
  color:#f4c879;
  min-height:58px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}
.build-btn:hover{filter:brightness(1.12)}
.home-tabs{
  max-width:690px;
  margin:0 auto 12px;
}
.history-home{
  max-width:690px;
  margin:0 auto 18px;
}
.home-panel{display:none}
.home-panel.active{display:block}
.result-area{max-width:960px;margin:0 auto}
.result-area[hidden]{display:none}
.home-tabs,.bazi-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin:0 0 14px;
}
.home-tabs{grid-template-columns:repeat(2,1fr);margin:0 auto 12px}
.home-tabs button,.bazi-tabs button{
  border:1px solid #dbcaa9;
  border-radius:999px;
  background:#fffaf0;
  color:#72531e;
  min-height:38px;
  font-weight:800;
  cursor:pointer;
}
.home-tabs button.active,.bazi-tabs button.active{
  background:#111;
  border-color:#111;
  color:#f6cf84;
}
.bazi-view{display:none}
.bazi-view.active{display:block}
.core-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.core-card{border-radius:18px;padding:18px;min-height:126px}
.core-card span,.section-title{display:block;color:#777;font-size:14px;margin-bottom:8px}
.core-card strong{display:block;font-size:28px;line-height:1.22;color:var(--red)}
.core-card em{display:block;margin-top:8px;color:#6f675d;font-style:normal;font-size:13px;line-height:1.45}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.info-grid div{border:1px solid #eadcc0;border-radius:12px;background:#fffaf2;padding:12px 14px}
.info-grid b{display:block;color:var(--red);font-size:13px;margin-bottom:6px}
.info-grid span{display:block;color:#253348;line-height:1.45}
.section-head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.section-head .section-title{margin-bottom:0}
.small-action{border:1px solid #dbcaa9;border-radius:999px;background:#fffaf0;color:#72531e;min-height:32px;padding:0 12px;font-size:13px;font-weight:800;cursor:pointer}
.small-action:hover{background:#fff2d8}
.pillar-stack-summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:2px;
}
.pillar-stack{
  min-width:0;
  border:1px solid #eee1ca;
  border-radius:12px;
  background:#fffaf0;
  padding:8px 4px;
  text-align:center;
}
.pillar-stack small{
  display:block;
  margin-bottom:5px;
  color:#8a7d70;
  font-size:11px;
  font-weight:700;
}
.pillar-stack b{
  display:block;
  font-size:26px;
  line-height:1;
  font-weight:900;
}
.pillar-stack b+ b{margin-top:6px}
.result-card{border-radius:18px;padding:18px;margin-bottom:14px;overflow:hidden}
.section-title{font-weight:800;color:#a8762f;text-align:center;font-size:16px}
.pillar-table{width:100%;border-collapse:collapse;text-align:center}
.pillar-table th,.pillar-table td{border-bottom:1px solid #eee7da;padding:10px 8px;vertical-align:middle}
.pillar-table th{color:#777;background:#faf7f1;font-size:13px}
.pillar-table .row-label{width:82px}
.pillar-table tr:last-child th,.pillar-table tr:last-child td{vertical-align:top}
.pillar-table-wrap{overflow-x:auto}
.pillar-table-wrap .pillar-table{min-width:860px}
.pillar-table small{display:block;color:#a8762f;font-size:11px;margin-top:3px}
.stem,.branch{font-size:36px;font-weight:900;line-height:1.1}
.hidden-stems{line-height:1.7;font-size:13px}
.wx-木{color:var(--wood)}.wx-火{color:var(--fire)}.wx-土{color:var(--earth)}.wx-金{color:var(--metal)}.wx-水{color:var(--water)}
.structure-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.wx-row{display:grid;grid-template-columns:36px 1fr 46px;gap:10px;align-items:center;margin-bottom:10px}
.wx-row div{height:10px;background:#efe8dc;border-radius:999px;overflow:hidden}
.wx-row i{display:block;height:100%;background:var(--gold);border-radius:999px}
.structure-note{display:grid;gap:10px}
.note-line{border:1px solid #eee1ca;background:#fffaf0;border-radius:10px;padding:10px 12px;line-height:1.65;color:#433a31}
.relation-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tag{border:1px solid #eadfc9;background:#fffaf0;border-radius:8px;padding:6px 9px;color:#604722;font-size:13px}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.detail-box{border:1px solid #eee1ca;background:#fffdf8;border-radius:12px;padding:11px 12px;line-height:1.65;color:#433a31}
.detail-box strong{color:#9b2f22}
.explain-help{position:relative;display:inline-flex;align-items:center;margin-left:6px;vertical-align:middle}
.explain-help-button{display:inline-grid;place-items:center;width:18px;height:18px;padding:0;border:1px solid #c9a96e;border-radius:50%;background:#fffaf0;color:#76501f;font:800 12px/1 Arial,sans-serif;cursor:help}
.explain-help-button:focus-visible{outline:2px solid #9b2f22;outline-offset:2px}
.explain-help-popover{position:absolute;z-index:30;top:calc(100% + 8px);left:-6px;width:min(410px,calc(100vw - 48px));padding:13px 14px;border:1px solid #dfc89e;border-radius:8px;background:#fffdf8;box-shadow:0 10px 28px rgba(67,58,49,.18);color:#433a31;font-size:13px;font-weight:400;line-height:1.65;opacity:0;visibility:hidden;transform:translateY(-4px);pointer-events:none;transition:opacity .16s ease,transform .16s ease,visibility .16s ease}
.explain-help:hover .explain-help-popover,.explain-help:focus-within .explain-help-popover{opacity:1;visibility:visible;transform:translateY(0);pointer-events:auto}
.detail-box:nth-child(even) .explain-help-popover,.note-line .explain-help-popover,.pattern-score-help .explain-help-popover{right:-6px;left:auto}
.explain-help-popover b{display:block;margin-bottom:5px;color:#9b2f22;font-size:14px}
.explain-help-popover p{margin:0 0 8px}
.explain-help-popover ul{margin:0 0 8px;padding-left:18px}
.explain-help-popover li+li{margin-top:4px}
.explain-help-popover p:last-child{margin-bottom:0}
.pattern-score-help .explain-help-popover p:last-child{font-weight:800}
.classical-pattern-note{display:block;margin-top:8px;padding-top:7px;border-top:1px solid #eee1ca;color:#806f5d;font-size:12px;line-height:1.6}
.phenomenon-detail{margin-top:8px;border-top:1px solid #eee1ca;padding-top:7px}
.phenomenon-detail summary{cursor:pointer;color:#8a5a20;font-weight:800}
.phenomenon-detail div{padding-top:6px}
.summary-panel{margin-top:12px;border:1px solid #eee1ca;background:#fffdf8;border-radius:14px;padding:13px}
.summary-panel h3{margin:0 0 10px;color:#9b2f22;font-size:15px}
.summary-panel .relation-list{margin-top:0}
.luck-table{width:100%;border-collapse:collapse;text-align:center}
.luck-table th,.luck-table td{border-bottom:1px solid #eee7da;padding:10px 8px}
.luck-table th{background:#faf7f1;color:#777}
.luck-table .current-luck{background:#fff5df;color:#8a2f20;font-weight:800}
.luck-overview{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.luck-overview .detail-box{margin:0}
.luck-rail{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:minmax(118px,1fr);
  gap:10px;
  overflow-x:auto;
  padding:2px 2px 12px;
  margin:8px 0 14px;
  scroll-snap-type:x proximity;
}
.luck-card{
  scroll-snap-align:start;
  border:1px solid #eadfc9;
  border-radius:16px;
  background:linear-gradient(180deg,#fffdf8,#fff8ed);
  padding:12px 10px;
  min-height:154px;
  box-shadow:0 10px 24px rgba(58,42,18,.06);
}
.luck-card.active{
  border-color:#9b2f22;
  background:linear-gradient(180deg,#fff5df,#fff0d1);
  box-shadow:0 14px 28px rgba(155,47,34,.12);
}
.luck-card small{display:block;color:#867766;font-weight:800;font-size:12px}
.luck-card .luck-age{color:#9b2f22}
.luck-card .luck-gz{display:block;margin:8px 0 6px;color:#9b2f22;font-size:30px;line-height:1;font-weight:900}
.luck-card .luck-meta{display:grid;gap:5px;color:#554333;font-size:13px}
.luck-card .luck-now{margin-top:8px;color:#1f644f;font-weight:900;font-size:12px}
.flow-year-strip{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:2px 2px 10px;
  margin:6px 0 10px;
}
.flow-year{
  flex:0 0 auto;
  border:1px solid #eadfc9;
  border-radius:12px;
  background:#fffaf0;
  color:#65491e;
  padding:9px 12px;
  min-width:96px;
  text-align:center;
}
.flow-year.current{border-color:#9b2f22;background:#fff0d1;color:#9b2f22;font-weight:900}
.flow-year b{display:block;font-size:16px;margin-bottom:2px}
.flow-year span{display:block;font-size:12px;color:#766a5c}
.luck-detail{margin-top:12px;border:1px solid #eadfc9;border-radius:14px;background:#fffdf8;overflow:hidden}
.luck-detail summary{cursor:pointer;padding:11px 14px;color:#7a2f22;font-weight:900;background:#fff8ed}
.luck-detail .luck-table{margin:0}
.luck-professional{display:grid;gap:14px}
.luck-origin,.luck-selector,.luck-detail-panel{
  border:1px solid #eadfc9;
  border-radius:16px;
  background:#fffdf8;
  overflow:hidden;
}
.luck-block-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:11px 14px;
  background:#fff8ed;
  color:#9b2f22;
  font-weight:900;
}
.luck-block-title span{color:#7a746c;font-size:12px;font-weight:700}
.origin-strip{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  border-top:1px solid #f0e3cb;
}
.origin-col{padding:12px 10px;text-align:center;border-right:1px solid #f0e3cb}
.origin-col:last-child{border-right:0}
.origin-col small{display:block;color:#887b6b;font-weight:800}
.origin-col .origin-gz{display:grid;gap:5px;margin:7px 0}
.origin-col .origin-gz b{font-size:28px;line-height:1;font-weight:900}
.origin-col .origin-meta{color:#6a5a48;font-size:12px;line-height:1.7}
.fortune-row{border-top:1px solid #f0e3cb;padding:11px 12px}
.fortune-row h4{margin:0 0 9px;color:#7a2f22;font-size:14px}
.fortune-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.fortune-grid{display:grid;gap:8px;padding-bottom:0}
.year-grid{grid-template-columns:repeat(10,minmax(0,1fr))}
.month-grid{grid-template-columns:repeat(12,minmax(0,1fr))}
.fortune-item{
  flex:0 0 auto;
  min-width:102px;
  border:1px solid #eadfc9;
  border-radius:12px;
  background:#fffaf0;
  color:#5f4822;
  padding:9px 10px;
  text-align:center;
  cursor:pointer;
}
.fortune-item:hover{border-color:#b49350}
.fortune-item.active{border-color:#9b2f22;background:#fff0d1;color:#9b2f22;box-shadow:0 10px 24px rgba(155,47,34,.11)}
.fortune-item b{display:block;font-size:18px;line-height:1.1;margin:3px 0}
.fortune-item span{display:block;color:#817362;font-size:12px;line-height:1.35}
.month-item{min-width:86px}
.year-grid .fortune-item,.month-grid .fortune-item{min-width:0;padding:8px 4px}
.year-grid .fortune-item b,.month-grid .fortune-item b{font-size:16px}
.year-grid .fortune-item span,.month-grid .fortune-item span{font-size:11px}
.luck-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px}
.analysis-box{border:1px solid #eadfc9;background:#fffaf0;border-radius:13px;padding:12px;line-height:1.7}
.analysis-box strong{display:block;color:#9b2f22;margin-bottom:5px}
.analysis-box .relation-list{margin-top:0}
.selected-stack{display:flex;flex-wrap:wrap;gap:8px;padding:0 12px 12px}
.quick-ai{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 12px}
.quick-ai button{
  border:1px solid #d7c6a6;
  border-radius:9px;
  background:#fffaf0;
  color:#6f4a1d;
  padding:7px 10px;
  font-weight:800;
  cursor:pointer;
}
.ai-controls{display:grid;grid-template-columns:1fr 150px 120px 96px 96px;gap:10px;align-items:center;margin-top:12px}
.secondary,.primary-small{
  min-height:40px;
  border:1px solid #d7c6a6;
  border-radius:10px;
  background:#fffaf0;
  color:#6f4a1d;
  font-weight:800;
  cursor:pointer;
}
.primary-small{background:linear-gradient(180deg,#2c745f,#185743);border-color:#185743;color:#fff}
.ai-result{
  min-height:72px;
  margin-top:14px;
  border-top:1px dashed #d9c59c;
  padding-top:14px;
  color:#1f644f;
  line-height:1.85;
  font-size:14px;
}
.ai-turn{border:1px solid #eadfc9;border-radius:14px;background:#fffdf8;margin-bottom:14px;overflow:hidden}
.ai-turn-question{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;background:#fff5df;border-bottom:1px solid #eadfc9;padding:10px 12px;color:#7a2f22}
.ai-turn-question::-webkit-details-marker{display:none}
.ai-turn-question b{background:#9b2f22;color:#fff;border-radius:999px;padding:3px 8px;font-size:12px}
.ai-turn-question strong{grid-column:1/-1;color:#222;font-size:15px}
.ai-turn-question span{font-size:12px;color:#7f766c;text-align:right}
.turn-toggle{border:1px solid #d7c6a6;border-radius:999px;background:#fff;color:#7a2f22;font-weight:800;padding:4px 9px;cursor:pointer}
.turn-toggle::after{content:'展开'}
.ai-turn[open] .turn-toggle::after{content:'收起'}
.turn-delete{border:1px solid #d7c6a6;border-radius:999px;background:#fffaf0;color:#7a2f22;font-weight:800;padding:4px 9px;cursor:pointer}
.ai-turn-answer{white-space:pre-wrap;padding:13px 14px;color:#1f644f}
.ai-history-tools{display:flex;justify-content:flex-end;margin:10px 0 0}
.ai-history-tools button{border:1px solid #d7c6a6;border-radius:999px;background:#fffaf0;color:#7a2f22;font-weight:800;padding:6px 12px;cursor:pointer}
.fact-check{border-bottom:1px dashed #eadfc9;background:#fbf8ef;padding:10px 14px;color:#5d4c35}
.fact-check strong{color:#9b2f22}
.fact-check.ok strong{color:#1f644f}
.fact-check ul{margin:6px 0 0 18px;padding:0}
.ai-followup{display:grid;grid-template-columns:1fr 110px;gap:10px;margin-top:12px}
.history-list{display:grid;gap:8px;margin-top:12px}
.history-item{
  display:grid;
  grid-template-columns:1fr auto;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  border:1px solid #eadfc9;
  border-radius:12px;
  background:#fffdf8;
  padding:10px 12px;
  cursor:pointer;
  text-align:left;
}
.history-main{border:0;background:transparent;text-align:left;cursor:pointer;color:#222;font-weight:800;padding:0}
.history-item em{color:#7f766c;font-style:normal;font-size:12px}
.history-actions{display:flex;gap:6px}
.history-actions button{border:1px solid #d7c6a6;border-radius:8px;background:#fffaf0;color:#6f4a1d;font-weight:800;padding:6px 9px;cursor:pointer}
.empty{color:#888;font-size:13px;padding:8px}
@media(max-width:800px){
  .page{padding:18px 12px 34px}
  h1{font-size:26px}

  {name:'陕西省 西安市',aliases:['西安','xian'],lat:34.3416,lng:108.9398},
  {name:'贵州省 贵阳市',aliases:['贵阳','guiyang'],lat:26.6470,lng:106.6302}
];
var selectedLocation=LOCATIONS[1];
function resetLuckSelection(){luckSelection={luck:null,year:null,month:null}}

document.addEventListener('DOMContentLoaded',function(){
  initTimeEditor();
  renderLocations();
  resetBaziFormToNow();
  showBaziHome('form');
  renderHistory();
});

function pad(n){n=parseInt(n,10)||0;return(n<10?'0':'')+n}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function initTimeEditor(){
  document.getElementById('timeEditor').innerHTML=
    '<div class="time-grid">'+
    '<input id="birthYear" type="number" value="1990" onchange="updateDays();refreshBirthTimeDisplay()">'+
    '<select id="birthMonth" onchange="updateDays();refreshBirthTimeDisplay()"></select>'+
    '<select id="birthDay" onchange="refreshBirthTimeDisplay()"></select>'+
    '<select id="birthHour" onchange="refreshBirthTimeDisplay()"></select>'+
    '<select id="birthMinute" onchange="refreshBirthTimeDisplay()"></select>'+
    '</div>';
  var m=document.getElementById('birthMonth'),h=document.getElementById('birthHour'),mi=document.getElementById('birthMinute');
  for(var i=1;i<=12;i++)m.innerHTML+='<option value="'+i+'">'+i+'月</option>';
  for(i=0;i<24;i++)h.innerHTML+='<option value="'+i+'">'+pad(i)+'时</option>';
  for(i=0;i<60;i++)mi.innerHTML+='<option value="'+i+'">'+pad(i)+'分</option>';
  m.value=5;h.value=7;mi.value=0;updateDays(7);refreshBirthTimeDisplay();
}
function updateDays(preferred){
  var y=parseInt(document.getElementById('birthYear').value,10)||1990;
  var m=parseInt(document.getElementById('birthMonth').value,10)||1;
  var d=document.getElementById('birthDay'),cur=preferred||parseInt(d.value,10)||1,max=new Date(y,m,0).getDate();
  d.innerHTML='';
  for(var i=1;i<=max;i++)d.innerHTML+='<option value="'+i+'">'+i+'日</option>';
  d.value=Math.min(cur,max);
}
function getInputTime(){
  return {
    year:parseInt(document.getElementById('birthYear').value,10)||1990,
    month:parseInt(document.getElementById('birthMonth').value,10)||1,
    day:parseInt(document.getElementById('birthDay').value,10)||1,
    hour:parseInt(document.getElementById('birthHour').value,10)||0,
    minute:parseInt(document.getElementById('birthMinute').value,10)||0
  };
}
function formatTime(t){return t.year+'-'+pad(t.month)+'-'+pad(t.day)+' '+pad(t.hour)+':'+pad(t.minute)}
function dateToTime(date){
  return {year:date.getFullYear(),month:date.getMonth()+1,day:date.getDate(),hour:date.getHours(),minute:date.getMinutes()};
}
function getLunarText(date){
  try{return new Intl.DateTimeFormat('zh-CN-u-ca-chinese',{year:'numeric',month:'long',day:'numeric'}).format(date);}
  catch(e){return '农历不可用';}
}
function getInquiryTimeInfo(date){
  date=date||new Date();
  var t=dateToTime(date),flowYear=t.year;
  if(t.month===1||(t.month===2&&t.day<4))flowYear--;
  var flowGz=getYearGZ(t.year,t.month,t.day);
  var note=flowYear===t.year?'已过立春，八字流年按'+flowGz:'未到立春，八字流年仍按'+flowGz;
  return {time:t,text:formatTime(t),lunar:getLunarText(date),flowYearNumber:flowYear,flowYearGz:flowGz,solarTermNote:note};
}
function refreshBirthTimeDisplay(){
  var t=getInputTime();
  document.getElementById('birthTimeDisplay').textContent=t.year+'年'+pad(t.month)+'月'+pad(t.day)+'日 '+pad(t.hour)+':'+pad(t.minute);
  refreshSolarPreview();
}
function toggleTimeEditor(){
  var panel=document.getElementById('timeEditor');
  panel.hidden=!panel.hidden;
}
function toggleLocationPanel(){
  var panel=document.getElementById('locationPanel');
  panel.hidden=!panel.hidden;
  if(!panel.hidden)renderLocations();
}
function renderLocations(){
  var q=(document.getElementById('locationSearch').value||'').trim().toLowerCase();
  var list=LOCATIONS.map(function(loc,i){return {loc:loc,index:i}}).filter(function(item){
    if(!q)return !!item.loc.preset;
    return item.loc.name.toLowerCase().indexOf(q)>=0 || item.loc.aliases.some(function(a){return a.toLowerCase().indexOf(q)>=0});
  });
  document.getElementById('locationList').innerHTML=list.map(function(item){
    return '<button type="button" class="location-option" onclick="selectLocation('+item.index+')"><strong>'+esc(item.loc.name)+'</strong><span>'+locationCoordText(item.loc)+'</span></button>';
  }).join('') || '<div class="empty">没有匹配地点，可换关键词搜索</div>';
}
function selectLocation(index){
  selectedLocation=LOCATIONS[index]||LOCATIONS[1];
  document.getElementById('birthLocationDisplay').textContent=selectedLocation.name;
  document.getElementById('locationPanel').hidden=true;
  refreshSolarPreview();
}
function locationCoordText(loc){
  return '东经'+Number(loc.lng).toFixed(4)+(loc.lat==null?'':' 北纬'+Number(loc.lat).toFixed(4));
}
function selectCustomLocation(){
  var name=(document.getElementById('customLocationName').value||'自定义地点').trim();
  var lng=parseFloat(document.getElementById('customLongitude').value);
  if(!isFinite(lng)||lng<-180||lng>180){alert('请输入有效经度，例如上海 121.4737');return}
  selectedLocation={name:name||'自定义地点',aliases:[],lng:lng,lat:null};
  document.getElementById('birthLocationDisplay').textContent=selectedLocation.name+'（东经'+lng.toFixed(4)+'）';
  document.getElementById('locationPanel').hidden=true;
  refreshSolarPreview();
}
function dayOfYear(y,m,d){var start=new Date(y,0,0);return Math.floor((new Date(y,m-1,d)-start)/86400000)}
function equationOfTimeMinutes(y,m,d){var n=dayOfYear(y,m,d);var b=2*Math.PI*(n-81)/364;return 9.87*Math.sin(2*b)-7.53*Math.cos(b)-1.5*Math.sin(b)}
function addMinutes(t,mins){var dt=new Date(t.year,t.month-1,t.day,t.hour,t.minute+Math.round(mins));return {year:dt.getFullYear(),month:dt.getMonth()+1,day:dt.getDate(),hour:dt.getHours(),minute:dt.getMinutes()}}
function minutesBetween(a,b){return Math.round((new Date(b.year,b.month-1,b.day,b.hour,b.minute)-new Date(a.year,a.month-1,a.day,a.hour,a.minute))/60000)}
function normalizeSolarCorrectionData(data){
  var out=Object.assign({},data||{}),lng=Number(out.location&&out.location.lng);
  if(!Number.isFinite(Number(out.longitudeCorrection))&&Number.isFinite(lng))out.longitudeCorrection=(lng-120)*4;
  if(!Number.isFinite(Number(out.equationCorrection))){
    if(Number.isFinite(Number(out.correction))&&Number.isFinite(Number(out.longitudeCorrection)))out.equationCorrection=Number(out.correction)-Number(out.longitudeCorrection);
    else if(out.input)out.equationCorrection=equationOfTimeMinutes(out.input.year,out.input.month,out.input.day);
  }
  if(!Number.isFinite(Number(out.correction))){
    if(Number.isFinite(Number(out.longitudeCorrection))&&Number.isFinite(Number(out.equationCorrection)))out.correction=Number(out.longitudeCorrection)+Number(out.equationCorrection);
    else if(out.input&&out.used)out.correction=minutesBetween(out.input,out.used);
  }
  ['correction','longitudeCorrection','equationCorrection'].forEach(function(k){if(!Number.isFinite(Number(out[k])))out[k]=0});
  return out;
}
function formatOffset(mins){mins=Number(mins);if(!Number.isFinite(mins))mins=0;var sign=mins>=0?'+':'-';mins=Math.abs(Math.round(mins));return sign+Math.floor(mins/60)+'小时'+pad(mins%60)+'分'}
function formatSolarCorrection(data){
  data=normalizeSolarCorrectionData(data);
  return '校正 '+formatOffset(data.correction)+' = 经度 '+formatOffset(data.longitudeCorrection)+' + 均时差 '+formatOffset(data.equationCorrection);
}
function getUsedTime(){
  var input=getInputTime();
  var enabled=document.getElementById('useTrueSolar').checked;
  var longitudeCorrection=(selectedLocation.lng-120)*4;
  var equationCorrection=equationOfTimeMinutes(input.year,input.month,input.day);
  var correction=longitudeCorrection+equationCorrection;
  return {input:input,used:enabled?addMinutes(input,correction):input,correction:correction,longitudeCorrection:longitudeCorrection,equationCorrection:equationCorrection,enabled:enabled,location:selectedLocation};
}
function refreshSolarPreview(){
  if(!document.getElementById('birthYear'))return;
  var data=getUsedTime();
  document.getElementById('solarPreview').innerHTML=data.enabled
    ? '真太阳时：<strong>'+formatTime(data.used)+'</strong><br>'+formatSolarCorrection(data)+'<br>地址经纬：'+locationCoordText(data.location)
    : '未启用真太阳时，将按输入时间排盘<br>地址经纬：'+locationCoordText(data.location);
}
function resetBaziFormToNow(){
  var now=new Date();
  document.getElementById('personName').value='';
  document.getElementById('genderMale').checked=true;
  document.getElementById('birthYear').value=now.getFullYear();
  document.getElementById('birthMonth').value=now.getMonth()+1;
  updateDays(now.getDate());
  document.getElementById('birthHour').value=now.getHours();
  document.getElementById('birthMinute').value=now.getMinutes();
  selectedLocation=LOCATIONS[1];
  document.getElementById('birthLocationDisplay').textContent=selectedLocation.name;
  document.getElementById('useTrueSolar').checked=true;
  refreshBirthTimeDisplay();
}
function fillBaziFormFromData(data){
  if(!data)return;
  document.getElementById('personName').value=data.person||'';
  document.getElementById(data.gender==='女'?'genderFemale':'genderMale').checked=true;
  var t=(data.time&&data.time.input)||dateToTime(new Date());
  document.getElementById('birthYear').value=t.year;
  document.getElementById('birthMonth').value=t.month;
  updateDays(t.day);
  document.getElementById('birthHour').value=t.hour;
  document.getElementById('birthMinute').value=t.minute;
  if(data.time&&data.time.location){
    selectedLocation={name:data.time.location.name||'自定义地点',lng:Number(data.time.location.lng)||120,lat:data.time.location.lat==null?null:Number(data.time.location.lat)};
    document.getElementById('birthLocationDisplay').textContent=selectedLocation.name;
  }
  document.getElementById('useTrueSolar').checked=!(data.time&&data.time.enabled===false);
  refreshBirthTimeDisplay();
}
function editCurrentBaziInput(){
  if(!currentBazi)return;
  fillBaziFormFromData(currentBazi);
  editingActiveRecord=!!activeBaziRecordId;

function stemRelationInfo(data){

  var he={'甲己':'合土','乙庚':'合金','丙辛':'合水','丁壬':'合木','戊癸':'合火'};
  var chong={'甲庚':'冲','乙辛':'冲','丙壬':'冲','丁癸':'冲'};
  for(var i=0;i<stems.length;i++)for(var j=i+1;j<stems.length;j++){
    var pair=[stems[i],stems[j]].sort(function(a,b){return TIAN_GAN.indexOf(a)-TIAN_GAN.indexOf(b)}).join('');
    if(he[pair])out.push('<span class="tag">'+stems[i]+stems[j]+he[pair]+'</span>');

  }

}
function rootInfo(data){
  data=refreshPatternAnalysis(data);
  var items=data.patternAnalysis&&data.patternAnalysis.strengthScore&&data.patternAnalysis.strengthScore.dimensions&&data.patternAnalysis.strengthScore.dimensions.roots.items;
  if(items)return items.length?items.map(function(x){return x.text}).join('、'):'未见同类本气、中气或余气根。';
  var day=data.dayStem,roots=[];
  Object.keys(data.pillars).forEach(function(k){

function stemRevealInfo(data){

function patternCandidates(data){
  data=refreshPatternAnalysis(data);
  var analysis=data.patternAnalysis||{},main=analysis.mainPattern||'未见明确成格';
  var structures=analysis.patternStructures||[];
  var mainStructure=structures.find(function(item){return item.role==='主格'});
  var supporting=structures.filter(function(item){return (item.role==='兼格'||item.role==='辅助结构')&&item.status!=='待成'}).map(function(item){return item.name});
  var issues=(analysis.patternIssues||[]).concat(structures.filter(function(item){return item.role==='病点'}).map(function(item){return item.name})).filter(function(x,i,a){return x&&a.indexOf(x)===i});
  var lead=main==='未见明确成格'&&structures.find(function(item){return item.role==='线索'&&/相生|制杀|配印|生财/.test(item.name)});
  var lines=[main==='未见明确成格'?'主格：未成，保留月令主线':'主格：'+main+(mainStructure&&mainStructure.status?'（'+mainStructure.status+'）':'')];
  if(analysis.monthCommand&&analysis.monthCommand.ambiguous)lines.push('月令兼用：'+analysis.monthCommand.selectedGods.join('、')+'（待清）');
  if(analysis.regularPattern&&analysis.regularPattern.name!==main)lines.push('月令格：'+analysis.regularPattern.name+'（'+analysis.regularPattern.status+'）');
  if(supporting.length)lines.push('兼见：'+supporting.join('、'));
  if(issues.length)lines.push('主要病点：'+issues.join('、'));
  if(lead)lines.push('待成线索：'+lead.name.replace('参考',''));
  return lines.join('<br>');
}

function usefulPriorityText(data,technical){
  data=refreshPatternAnalysis(data);
  var item=data.patternAnalysis&&data.patternAnalysis.usePriority;
  var roles=data.useful&&data.useful.roles;
  var specific=data.useful&&data.useful.specific;
  var conditional=data.useful&&data.useful.conditionalUse||[];
  var conflictText=item&&item.conflicts&&item.conflicts.length?'<br>取舍冲突：'+item.conflicts.map(function(x){return x.element+'（'+x.decision+'：'+x.why+'）'}).join('；'):'';
  var conditionalText=conditional.length?'<br>喜中带忌：'+conditional.map(function(x){return x.element+'：'+x.benefit+'；但'+x.risk}).join('；'):'';
  function specificItems(items){return (items||[]).map(function(x){return x.element+'取'+x.tenGods.join('、')+'（'+x.stems.join('、')+'，'+(x.state||(x.present?'原局有据':'待运补入'))+'）'}).join('；')}
  var specificText=specific?'<br>具体十神：主用 '+(specificItems(specific.primary)||'待定')+'；佐用 '+(specificItems(specific.secondary)||'无')+'；慎用 '+(specificItems(specific.avoid)||'无'):'';
  function role(name,key){
    var value=roles&&roles[key];
    if(!value||!value.elements.length)return name+'：无';
    var gods=value.tenGods&&value.tenGods.length?'（'+value.tenGods.join('、')+'）':'';
    return name+'：'+value.elements.join('、')+gods;
  }
  if(!technical){
    var primary=(data.useful.primaryUse||data.useful.use||[]).join('、')||'待定';
    var secondary=(data.useful.secondaryUse||[]).join('、')||'无';
    var avoid=(data.useful.avoid||[]).join('、')||'无';
    return (item?item.type+'取用：'+item.text:'综合格局、扶抑与调候取用。')+'<br>结论：主用 '+primary+'；佐用 '+secondary+'；慎用 '+avoid+(conditional.length?'<br>条件用神：'+conditional.map(function(x){return x.element+'（'+x.benefit+'，但'+x.risk+'）'}).join('；'):'');
  }
  return item?(item.type+'：'+item.text+conflictText+conditionalText+specificText+(roles?'<br>'+[
    role('月令用神（定格）','monthCommandGod'),role('格局用神','patternGod'),role('相神','assistantGod')
  ].join('；')+'<br>'+[

function luckStartAge(data){

  var approxTerms=[{m:1,d:6},{m:2,d:4},{m:3,d:6},{m:4,d:5},{m:5,d:6},{m:6,d:6},{m:7,d:7},{m:8,d:8},{m:9,d:8},{m:10,d:8},{m:11,d:7},{m:12,d:7}];
  var date=new Date(data.time.used.year,month-1,day),dir=luckDirection(data),target=null;
  approxTerms.forEach(function(t){
    var term=new Date(data.time.used.year,t.m-1,t.d);
    if(dir>0&&term>date&&(!target||term<target))target=term;
    if(dir<0&&term<date&&(!target||term>target))target=term;
  });
  if(!target)target=new Date(data.time.used.year+(dir>0?1:-1),dir>0?0:11,dir>0?6:7);

function stemPairRelation(a,b){
  var he={'甲己':'合土','乙庚':'合金','丙辛':'合水','丁壬':'合木','戊癸':'合火'},chong={'甲庚':'冲','乙辛':'冲','丙壬':'冲','丁癸':'冲'};
  var pair=[a,b].sort(function(x,y){return TIAN_GAN.indexOf(x)-TIAN_GAN.indexOf(y)}).join('');
  return he[pair]||chong[pair]||'';
}
function branchPairRelation(a,b){
  var pair=[a,b].sort(function(x,y){return DI_ZHI.indexOf(x)-DI_ZHI.indexOf(y)}).join('');
  var groups=[
    [{子丑:1,寅亥:1,卯戌:1,辰酉:1,巳申:1,午未:1},'六合'],
    [{子午:1,丑未:1,寅申:1,卯酉:1,辰戌:1,巳亥:1},'冲'],
    [{子未:1,丑午:1,寅巳:1,卯辰:1,申亥:1,酉戌:1},'害'],
    [{子酉:1,丑辰:1,寅亥:1,卯午:1,巳申:1,未戌:1},'破']
  ];
  return groups.filter(function(g){return g[0][pair]}).map(function(g){return g[1]}).join('、');
}
function selectedRelationTags(data,ctx){
  var base=[['年',data.pillars.year],['月',data.pillars.month],['日',data.pillars.day],['时',data.pillars.hour]];
  var extras=[['大运',ctx.luckRow.gz],['流年',ctx.flowYear.gz]],out=[];
  if(ctx.flowMonth)extras.push(['流月',ctx.flowMonth.gz]);
  extras.forEach(function(e){
    base.concat(extras).forEach(function(b){
      if(e[0]===b[0])return;
      var sr=stemPairRelation(e[1][0],b[1][0]),br=branchPairRelation(e[1][1],b[1][1]);
      if(sr)out.push(e[0]+e[1][0]+' 与 '+b[0]+b[1][0]+' '+sr);
      if(br)out.push(e[0]+e[1][1]+' 与 '+b[0]+b[1][1]+' '+br);
    });
  });
  return out.filter(function(x,i,a){return a.indexOf(x)===i});
}

}
function getBaziRecords(){return JSON.parse(localStorage.getItem(BAZI_RECORDS)||'[]')}
function setBaziRecords(items){localStorage.setItem(BAZI_RECORDS,JSON.stringify(items.slice(0,50)))}
function syncActiveBaziRecord(){
  if(!activeBaziRecordId||!currentBazi)return;
  var items=getBaziRecords(),item=items.find(function(x){return x.id===activeBaziRecordId});
  if(!item)return;
  item.bazi=currentBazi;
  item.aiHistory=aiHistory;
  item.updatedAt=new Date().toLocaleString();
  setBaziRecords(items);
  renderHistory();
}
function saveBaziRecord(){
  if(!currentBazi)return;
  var items=getBaziRecords(),item=activeBaziRecordId&&items.find(function(x){return x.id===activeBaziRecordId});
  if(item){
    item.bazi=currentBazi;
    item.aiHistory=aiHistory;
    item.updatedAt=new Date().toLocaleString();
  }else{
    item={id:Date.now().toString(36),name:(currentBazi.person||'未命名')+' '+currentBazi.pillars.day+'日',createdAt:new Date().toLocaleString(),bazi:currentBazi,aiHistory:aiHistory};
    activeBaziRecordId=item.id;
    items.unshift(item);
  }
  setBaziRecords(items);
  renderHistory();
}
function renderHistory(){
  var box=document.getElementById('historyList');
  if(!box)return;
  var items=getBaziRecords();
  box.innerHTML=items.length?items.map(function(x){
    return '<div class="history-item">'+
      '<button type="button" class="history-main" onclick="loadBaziRecord(\''+x.id+'\')"><span>'+esc(x.name)+'</span> <em>'+esc(x.updatedAt||x.createdAt)+'</em></button>'+
      '<div class="history-actions">'+
      '<button type="button" onclick="editBaziRecord(\''+x.id+'\')">改名</button>'+
      '<button type="button" onclick="deleteBaziRecord(\''+x.id+'\')">删除</button>'+
      '</div></div>';
  }).join(''):'<div class="empty">暂无保存记录</div>';
}
function editBaziRecord(id){
  var items=getBaziRecords(),item=items.find(function(x){return x.id===id});
  if(!item)return;
  var name=prompt('修改保存标题',item.name);
  if(!name||!name.trim())return;
  item.name=name.trim();
  if(item.bazi&&!item.bazi.person)item.bazi.person=recordPersonFromTitle(item);
  setBaziRecords(items);
  renderHistory();
}
function deleteBaziRecord(id){
  if(!confirm('删除这条保存记录？'))return;
  setBaziRecords(getBaziRecords().filter(function(x){return x.id!==id}));
  if(activeBaziRecordId===id)activeBaziRecordId=null;
  renderHistory();
}
function loadBaziRecord(id){
  var item=getBaziRecords().find(function(x){return x.id===id});
  if(!item)return;
  currentBazi=item.bazi;
  if(currentBazi)currentBazi.person=recordPersonFromTitle(item);
  aiHistory=item.aiHistory||[];
  aiCollapsed={};
  activeBaziRecordId=id;
  resetLuckSelection();
  renderBazi(currentBazi);
  showBaziResult();
}
function recordPersonFromTitle(item){
  var person=item&&item.bazi&&item.bazi.person;
  if(person&&person!=='测试')return person;
  var title=(item&&item.name||'').trim();
  title=title.replace(/\s*[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]日\s*$/,'').trim();
  return title||person||'';
}
</script>
